---
# Keystone-generated Pandoc metadata file
# See: https://pandoc.org/MANUAL.html#variables for more details

# Book layout settings
documentclass: book
keystone-justify: true
keystone-indent: true

# Note placement (PDF only): footnotes (page bottom) or endnotes (collected
# at end of book). Author pandoc.yaml may override. EPUB is always section-end.
keystone-note-placement: endnotes
keystone-required-fields:
  - description

# EPUB and HTML specific styling
css:
  - .pandoc/includes/base-style.css

# LaTeX-specific styling
header-includes:
  - \input{.pandoc/includes/base-packages.tex}

  # Page layout (running headers/footers). Slot content comes from
  # page-furniture.lua; this include is pure wiring.
  - \input{.pandoc/includes/page-layout-fancyhdr.tex}

  # Load styles last to avoid any conflicts
  - \input{.pandoc/includes/base-style.tex}
...
