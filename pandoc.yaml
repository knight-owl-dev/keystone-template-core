---
# Keystone-generated Pandoc metadata file
# See: https://pandoc.org/MANUAL.html#variables for more details

# The title of your book
#
# This is the main title of your book, which will appear on the cover and in metadata.
# It should be a descriptive title that reflects the content of your book.
#
title: Keystone

# The subtitle of your book
#
# This is an optional subtitle that provides additional context or information about your book.
# It will appear on the cover and in metadata. Leave empty if you don't want a subtitle.
#
subtitle: The sample book using the Keystone project

# The author of your book
#
# This is the name of the author or organization responsible for the book.
# It will appear on the cover and in metadata. You can include multiple authors
# by separating them with commas.
#
author: Knight Owl LLC

# The date of your book
#
# This is the publication date of your book. It can be a specific date or a keyword.
#
# Accepted values:
# - auto: Automatically set to the current date when building the book
# - disabled: Do not include a date in the book
# - any date representing text, e.g., March 30, 2025
#
date: auto

# The language (culture) of your book
#
# This sets the main document language, affecting metadata, chapter names, hyphenation,
# and language-specific behavior in LaTeX, EPUB, and HTML.
#
# Use standard culture codes, e.g., en, en-US, en-CA, uk, uk-UA, de, fr, etc.
#
lang: en-US

# The build target
#
# Selects the documentclass and validation rules for your project.
# Each "scr*" target is the KOMA-Script counterpart of the standard
# class with the same role — modern European book typography without
# changing your source. KOMA targets use scrlayer-scrpage for running
# headers/footers; standard targets use fancyhdr. Same six-slot
# header/footer contract either way.
#
# Accepted values:
# - book      (chapters, recto/verso layout, requires description)
# - scrbook   (KOMA scrbook — chapters, recto/verso, requires description)
# - report    (chapters, single-sided layout, requires abstract)
# - scrreprt  (KOMA scrreprt — chapters, single-sided, requires abstract)
# - article   (sections, single-sided layout, requires abstract)
# - scrartcl  (KOMA scrartcl — sections, single-sided, requires abstract)
#
target: book

# Table of contents
#
# Generates a table of contents at the beginning of the document.
# Set to false to disable.
#
toc: true

# Section numbering
#
# Adds hierarchical numbers to section headings (e.g. 1, 1.1, 1.1.1).
# Set to false to disable. To exempt individual headings, use the
# {.unnumbered} attribute: # Preface {.unnumbered}
#
numbersections: true

# Text justification control
#
# Controls whether body text is justified (even left and right margins)
# or ragged-right (even left margin only). Justified is the publishing
# default; ragged-right can improve readability on narrow page widths.
#
# Accepted values:
#   auto      — use the target's default (justified for book/report/article)
#   disabled  — ragged-right text
#
justify-control: auto

# First-line paragraph indentation control
#
# Controls whether continuation paragraphs have a first-line indent.
# Indented paragraphs are the typographic norm for books; articles and
# reports use block paragraphs (no indent) by default.
#
# Accepted values:
#   auto      — use the target's default (indented for book, none for article/report)
#   disabled  — no first-line indent
#
indent-control: auto

# Note placement (PDF only)
#
# Controls where notes land in PDF output. The same Markdown footnote syntax
# (`[^1]` or `^[...]`) is used either way — only the placement changes. EPUB has
# no fixed pages, so it always renders notes section-end regardless.
#
# Accepted values:
#   footnotes  — at the bottom of the page where the marker appears
#   endnotes   — collected under a "Notes" heading at the end of the document
#
# The default is target-dependent: book and scrbook collect endnotes; article,
# report, and their KOMA variants use footnotes. Leave this commented to keep
# your target's convention; uncomment only to override it — for example, a book
# that uses a note-style citation style (chicago-notes-bibliography) collects its
# citation notes as endnotes by default; set footnotes here to keep them at the
# foot of the page instead.
# See https://keystone.knight-owl.dev/writing/notes-and-citations/ for the full guide.
#
# keystone-note-placement: footnotes

# Running-header marks — author-declared values (PDF only)
#
# Declares custom mark channels that the manuscript sets at points in the
# flow and that running headers/footers read via the `{name}` placeholder.
# Use this for running content that no heading tracks — e.g. a poetry
# anthology naming the current poem's author and title on each spread:
#
#   marks:
#     - poem-author
#     - poem-title
#
# Set a declared mark inline with the `.set` handler (span or div). It
# produces no visible content in any format and persists in the running
# header until the next `.set` for that mark — set empty content to clear it:
#
#   [John Keats]{.set mark="poem-author"}
#   ::: {.set mark="poem-title"}
#   Ode
#   :::
#
# Then read it in a header/footer key by name, exactly like a built-in
# placeholder (and compose shortcuts like `.set-author` over `.set` in
# shortcuts.yaml to avoid repeating the mark name):
#
#   header-text-recto: "[{poem-author} — {poem-title}]{.smallcaps}"
#
# Declaring a mark is what turns `{poem-author}` from an unknown-placeholder
# warning into a resolved value. Names use the placeholder grammar (letters,
# digits, hyphen, underscore; start with a letter) and may not shadow the
# built-in placeholders (title, author, date, page, chapter, section) — a bad
# name or a `.set mark=` naming an undeclared mark is a hard error.
# See https://keystone.knight-owl.dev/writing/running-headers/ for the full guide.
#
marks:

# Running header text (PDF only)
#
# Free-form inline content rendered in the header. Goes to the center
# slot unless page-number-position occupies that slot, in which case
# the header text is suppressed (with a stderr WARNING) and the page
# number wins.
#
# For two-sided documents (book / scrbook by default), use the
# header-text-recto and header-text-verso keys below to render
# different content on right-hand and left-hand pages — the
# conventional book-typography pattern (book title on verso, chapter
# title on recto). The un-suffixed header-text here applies the same
# content to every page and acts as the fallback when only one of
# the parity-suffixed keys is set. Setting any value to `disabled`
# suppresses that variant — at the un-suffixed key it suppresses
# both parities, at a suffixed key it suppresses just that one.
#
# Chapter-start pages — the first page of every chapter and the
# table of contents — are intentionally bare (no header, no footer,
# no rule). The chapter heading is the page's only landmark, which
# is the standard book typography convention. Running content set
# here resumes from the second page of each section onward.
#
# Accepted values:
# - blank, ~, null, or disabled — no header text
# - any inline markdown, e.g.:
#     header-text: Jane Doe
#     header-text: "*The Hitchhiker's Guide*"
#     header-text: "[The Title]{.smallcaps}"
#     header-text: "[Body]{.font family=eb-garamond}"
#
# Inline shortcuts and system handlers (.font, .align, custom shortcuts
# from shortcuts.yaml) are dispatched by the standard filter pipeline
# before this text is rendered into the header.
#
# Placeholders — embed dynamic or static values inside header / footer
# content with `{name}` token syntax. Six placeholders ship in the
# registry:
#
#   Static (resolved from metadata at build time, fixed thereafter):
#     {title}    — value of `title:`
#     {author}   — value of `author:`
#     {date}     — value of `date:`
#
#   Dynamic (resolve per page at PDF render time, update as content
#   paginates):
#     {page}     — the current page number
#     {chapter}  — the current chapter title (from `# Heading`)
#     {section}  — the current section title (from `## Heading`)
#
#   Plus any author-declared mark (see `marks:` above): {<name>} reads a
#   value the manuscript sets with `[…]{.set mark="<name>"}`, tracking
#   pagination like {chapter}/{section} but fed by the author, not headings.
#
# Examples:
#   header-text: "{author} | {title}"
#   header-text-recto: "{chapter}"
#   header-text-verso: "{title}"
#   footer-text: "Chapter {chapter} | {page}"
#
# To render a literal `{` or `}`, double them: `{{` and `}}`.
# Unrecognized placeholder names (e.g. typos like `{authr}`) emit a
# stderr WARNING and pass through as literal text in the PDF — loud
# about the typo without breaking the build.
#
# Substitution happens inside any surrounding inline markup, so
# `**{chapter}**`, `[{title}]{.smallcaps}`, and
# `[{author}]{.font family=eb-garamond}` all work — the placeholder
# resolves inside the markup wrapper.
#
header-text:

# Running header text on recto (right-hand) pages (PDF only)
#
# Per-parity override for header-text on recto pages — the right-hand
# leaf of a two-page spread, odd-numbered in book typography. Used by
# the book and scrbook targets (two-sided layout) to render a recto-
# specific running header, most often the chapter title.
#
# Falls back to header-text when blank or absent. Set to `disabled`
# to render no recto header (independent of what header-text-verso
# does).
#
# Single-sided targets (article, scrartcl, report, scrreprt — or any
# document with `classoption: oneside`) treat every body page as
# recto, so this value renders on every page. The un-suffixed
# header-text is conventionally preferred there — there is no verso
# to distinguish from — but `header-text-recto` is functionally
# equivalent.
#
# Accepts the same inline markdown / handlers / shortcuts as
# header-text.
#
header-text-recto:

# Running header text on verso (left-hand) pages (PDF only)
#
# Per-parity override for header-text on verso pages — the left-hand
# leaf of a two-page spread, even-numbered in book typography. Used
# by the book and scrbook targets (two-sided layout) to render a
# verso-specific running header, most often the book title.
#
# Falls back to header-text when blank or absent. Set to `disabled`
# to render no verso header (independent of what header-text-recto
# does).
#
# Single-sided targets compile this value but never render it (every
# page is treated as recto under one-sided layout).
#
# Accepts the same inline markdown / handlers / shortcuts as
# header-text.
#
header-text-verso:

# Running-header rule (PDF only)
#
# Draws a thin horizontal rule beneath the running header on body pages.
# Off by default for every target — the clean, trade-book convention.
# Enable it for the rule-under-the-running-head look common in technical
# and academic typography.
#
# The rule never appears on chapter-start pages or the table of contents
# (those stay bare regardless), matching the running header/footer.
#
# Accepted values:
#   disabled  — no header rule (default)
#   enabled   — thin rule beneath the running header on body pages
#
header-rule: disabled

# Running footer text (PDF only)
#
# Free-form inline content rendered in the footer. Same semantics as
# header-text — goes to the center slot, suppressed by a center-slot
# page number, accepts inline markdown plus shortcuts/handlers, and
# is omitted from chapter-start pages.
#
# For two-sided documents, use footer-text-recto and footer-text-verso
# below to render different content per parity. The un-suffixed
# footer-text here is the fallback when a parity-suffixed key is
# absent and the same-on-every-page default when neither is set.
#
# Common pattern (replaces the legacy footer-copyright auto-string):
#   footer-text: © 2025 Jane Doe. All rights reserved.
#
footer-text:

# Running footer text on recto (right-hand) pages (PDF only)
#
# Per-parity override for footer-text on recto pages. Falls back to
# footer-text when blank or absent; set to `disabled` to render no
# recto footer. Single-sided targets treat every page as recto, so
# this renders on every body page there — the un-suffixed footer-text
# is conventionally preferred under oneside since there's no verso to
# distinguish from, but `footer-text-recto` works the same way.
#
# Accepts the same inline markdown / handlers / shortcuts as
# footer-text.
#
footer-text-recto:

# Running footer text on verso (left-hand) pages (PDF only)
#
# Per-parity override for footer-text on verso pages. Falls back to
# footer-text when blank or absent; set to `disabled` to render no
# verso footer. Single-sided targets compile this value but never
# render it.
#
# Accepts the same inline markdown / handlers / shortcuts as
# footer-text.
#
footer-text-verso:

# Page number position (PDF only)
#
# Where the page number is rendered. Use the form `<row>:<col>` where
# row is `header`, `footer`, or `header-and-footer` (renders the page
# number on both rows at the chosen column), and col is one of:
#
#   left | center | right   — positional, same column on every page
#   outer                   — right on recto, left on verso (outside edge)
#   inner                   — left on recto, right on verso (binding edge)
#
# `outer` and `inner` are meaningful when the target is two-sided
# (book / scrbook by default, or any target with `classoption: twoside`).
# On single-sided targets they resolve to `right` and `left`
# respectively because every page is treated as recto. The positional
# columns (left/center/right) keep their strict-positional semantics
# on every target.
#
# When the page number lands on `<row>:center` and the row's running
# text is non-blank, the page number wins and the text is suppressed
# with a stderr WARNING. The conflict fires per parity — one parity's
# text can be suppressed while the other parity's text renders.
#
# Chapter-start pages render bare regardless of this setting; the
# page number resumes from the second page of each section onward.
#
# Default: footer:outer — the book-typography convention (folio on
# the outside edge of every spread). On single-sided documents this
# is identical to footer:right because every page is treated as recto.
#
# Examples:
#   page-number-position: footer:outer
#   page-number-position: footer:right
#   page-number-position: header:center
#   page-number-position: header-and-footer:outer
#
page-number-position:

# A short description of your document
#
# Required for the book target (validation errors if missing — book does
# not fall back to abstract). Optional for article/report, which use
# abstract instead and let it bridge in. Included in EPUB Dublin Core
# metadata (`dc:description`). Also populates the PDF `/Subject` field —
# visible as "Subject" in PDF readers and "Description" in macOS Finder
# Get Info / Spotlight — unless `subject:` is set explicitly.
#
# It can span multiple lines, but keep it short and to the point.
#
description: |
  This is a tribute to beginnings.
  In every language, in every framework, "Hello, world" is the first spark — the moment code speaks back.
  This sample book is your invitation to begin — to build something real, reproducible, and yours.

# An optional subject line for the PDF
#
# Defaults to mirroring `description` (Keystone copies it across so the
# PDF `/Subject` field is never empty). Any blank form — bare key, `~`,
# `null`, empty string, or whitespace — is treated as "use the default".
# To override, set `subject:` to actual text — e.g. a short topic line
# for the PDF distinct from the longer EPUB blurb.
#
subject:

# A short abstract for your document
#
# Required for the article and report targets. Not used by the book
# target — book authors must populate `description:` directly; abstract
# is not bridged in for book.
#
# For article/report, abstract flows through the bridge chain:
#   abstract → description (when description is not set)
#            → subject     (when subject is not set)
#
# So a single `abstract:` value reaches EPUB `dc:description`, the PDF
# `/Subject` field, and the PDF XMP description — no need to set the
# other fields. Set `description` or `subject` explicitly only when you
# want different content in those slots.
#
# abstract: |
#   A concise summary of the article's content and purpose.
abstract:

# A list of keywords for your document
#
# This is a list of keywords or tags that describe the content of your document.
# They will be included in metadata for indexing or cataloging purposes.
# You can use any keywords that are relevant to your document.
#
keywords:
  - hello-world
  - keystone
  - book

# XMP metadata embedding (PDF only)
#
# Controls whether the PDF carries an XMP metadata packet alongside the
# legacy Info dictionary. The Info dict is what Adobe Reader, Preview,
# Spotlight, and macOS Finder display. The XMP packet is the modern
# parallel store consumed by archival pipelines and DAM systems.
#
# Loading hyperxmp (which writes the XMP packet) adds noticeable time
# to every xelatex pass, so this can be turned off when XMP is not
# needed — Title/Author/Subject still flow into the Info dict via plain
# hyperref.
#
# Accepted values:
#   auto      — embed both Info dict + XMP packet (default)
#   disabled  — Info dict only; `keywords` is dropped because Pandoc
#               emits it via \xmpquote (a hyperxmp macro)
#
xmp-metadata: auto

# -- References and citations -------------------------------------------------
# Keystone uses Pandoc's built-in citeproc processor. Add a bibliography to
# turn on citations, then cite entries from your Markdown with `[@key]` syntax
# (e.g. "as shown earlier [@smith2023, pp. 42-45]"). The bibliography renders
# automatically at the end of the document; to place it elsewhere, add a
# `# References` heading followed by an empty `::: {#refs}` / `:::` block.
# See https://keystone.knight-owl.dev/writing/notes-and-citations/ for the full guide.

# Bibliography (enables citations)
#
# Name of a BibTeX (.bib) or CSL-JSON bibliography file, or a list of them.
# Reference each file by bare name — Keystone looks for it in the manuscript/
# directory (the one place it belongs), so you never spell out the path. If
# the layout ever changes, your pandoc.yaml does not. Omit this key to disable
# citations entirely.
#
# Examples:
#   bibliography: references.bib
#   bibliography:
#     - primary.bib
#     - secondary.bib
#
bibliography:

# Citation style (CSL)
#
# Controls how citations and the bibliography are formatted. Set it to either:
#   - a style name shipped with Keystone:
#       chicago-author-date          (default — Chicago, author-date)
#       chicago-notes-bibliography   (Chicago, notes and bibliography)
#   - the name of your own .csl file placed in the manuscript/ directory,
#     e.g.  csl: my-journal.csl
#
# Omit to use the default (Chicago author-date). Only takes effect when a
# bibliography is set.
#
csl:

# Hyperlinked citations
#
# When true, each in-text citation is hyperlinked to its entry in the
# bibliography, so readers can jump to the full reference. Applies to
# author-date and numbered styles. Recommended for EPUB and PDF. Only takes
# effect when a bibliography is set.
#
link-citations: true

# -- PDF layout (LaTeX) -------------------------------------------------------
# These map to Pandoc's LaTeX template variables and are passed directly to
# the PDF engine. Pandoc reads them natively from this file — no scripts or
# environment variables needed.
#
# Reference: https://pandoc.org/MANUAL.html#variables-for-latex

# Paper size for LaTeX (PDF only)
#
# This corresponds to LaTeX's `papersize` option (no "paper" suffix).
#
# Common values:
# - letter     (8.5" x 11", US)
# - a4         (210mm x 297mm, international standard)
# - a5         (148mm x 210mm, compact book size)
# - b5         (176mm x 250mm, used in publishing)
#
papersize: letter

# Page geometry (margins) for LaTeX
#
# Use LaTeX geometry syntax: margin=1in or top=20mm, bottom=25mm, etc.
#
# Reference: https://ctan.org/pkg/geometry
#
# Common values:
# - margin=1in                                    (default, good for general documents)
# - top=20mm, bottom=25mm, left=20mm, right=20mm  (compact, use with a5)
# - inner=30mm, outer=20mm, top=25mm, bottom=25mm (wider inner margin for binding)
# - margin=10mm                                   (minimal margin — may clip when printed)
#
geometry: margin=1in

# Base font size for LaTeX document
#
# Accepted values: 10pt, 11pt, 12pt
# Default: 11pt
#
fontsize: 11pt

# Font family for the main body text (requires XeLaTeX engine)
#
# The Keystone font registry generates \setmainfont from this value.
# Libertine is the default. Comment out to fall back to Latin Modern.
#
# Supported values:
#   - libertine      (Linux Libertine — serif, with Biolinum as sans companion)
#   - dejavu-serif   (DejaVu Serif)
#   - dejavu-sans    (DejaVu Sans)
#   - dejavu-mono    (DejaVu Sans Mono)
#   - latin-modern   (Latin Modern Roman — the TeX default)
#
# Any other value is passed through to the Pandoc template as
# \usepackage{<value>} — use this for custom LaTeX font packages.
#
fontfamily: libertine

# Draft watermark (PDF only)
#
# Prints a light gray diagonal watermark across every page.
# Useful for marking review copies, confidential documents, or works in progress.
#
# Accepted values:
#   disabled  — no watermark (default)
#   enabled   — prints "DRAFT" watermark
#   <text>    — prints custom watermark text (e.g. "CONFIDENTIAL", "BORRADOR")
#
draft:

# Draft watermark scale (PDF only)
#
# Controls the size of the draft watermark relative to the page.
# Auto-scales by default so longer text fits the page diagonal.
# Set an explicit positive number to override.
#
# Accepted values:
#   (empty)  — auto-scale based on text length (default)
#   0.5      — half the default size
#   1.0      — full default size (fits ~5 characters diagonally)
#   1.5      — 50% larger than default
#
draft-scale:

# LaTeX document class options (PDF only)
#
# A list of options passed to LaTeX's \documentclass. Pandoc's default
# template applies these automatically. See the variables-for-latex
# reference linked above.
#
# Common values:
#   - twocolumn   (two-column page layout)
#   - landscape   (landscape orientation)
#   - draft       (show overfull hbox warnings)
#   - oneside     (disable recto/verso page differences)
#
# Example:
#   classoption:
#     - twocolumn
#
classoption:

# -- Code block styling --------------------------------------------------------

# Syntax highlighting theme for code blocks
#
# Controls both the token colors (keywords, strings, comments) and the
# background color of code blocks in PDF and EPUB output. Pandoc handles
# token-level coloring; Keystone coordinates the background (and foreground
# for dark themes) so everything looks right out of the box.
#
# Light themes:
#   - tango        (warm gray background, Tango palette)
#   - pygments     (Python Pygments palette)
#   - kate         (KDE Kate editor palette, white background)
#   - monochrome   (grayscale — bold/italic only, no syntax colors)
#   - haddock      (Haskell Haddock palette)
#
# Dark themes:
#   - espresso     (warm brown background, tan text)
#   - zenburn      (low-contrast dark gray, easy on the eyes)
#   - breezedark   (KDE Breeze Dark, cool blue-gray background)
#
# Default: tango
#
code-theme: tango

# -- EPUB options --------------------------------------------------------------

# The cover image for your book (EPUB only)
#
# Path to the cover image file relative to the project root.
# It should be a valid image format (e.g., PNG, JPG).
#
# This maps to Pandoc's `cover-image` metadata field and is used only
# when building EPUB output. Leaving it empty is safe — the Keystone
# Lua filter strips empty values so EPUB builds proceed without a cover.
#
# Example: ./assets/cover.jpg
#
cover-image:
...
