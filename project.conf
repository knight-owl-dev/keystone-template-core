# ------------------------------------------------------------------------------
# Keystone project configuration
#
# This file defines operational settings for your Keystone project: the project
# name (used in artifact filenames) and Docker naming. Book metadata — title,
# author, layout, cover image, etc. — belongs in pandoc.yaml.
#
# ➤ Update KEYSTONE_PROJECT below to match your project name.
# ➤ Everything else (layout, build steps, metadata) is handled automatically.
# ------------------------------------------------------------------------------

# The name of your project
#
# This is used to name generated artifacts (e.g., keystone-book-20250101.pdf).
# It should be a simple, lowercase string without spaces or special characters.
#
# Note: This is not the title of your book, but the name of the project.
#
# Example: hello-world
KEYSTONE_PROJECT=keystone

# ------------------------------------------------------------------------------
# Docker configuration (advanced users only)
# ------------------------------------------------------------------------------

# Docker Compose project name (used to name networks, containers, and volumes)
#
# This defines the Compose project namespace.
# By default, it's prefixed with "keystone-" for clarity and conflict avoidance.
#
# Example: keystone-hello-world → results in network name like `keystone-hello-world_default`
KEYSTONE_DOCKER_COMPOSE_PROJECT=keystone-${KEYSTONE_PROJECT}

# Docker image name for your project
#
# This is used when building the Docker image.
# By default, it matches the Compose project name, tagged as :local — but you
# can override it if you want a custom image tag (e.g., for registries or CI pipelines).
#
# Example: keystone-hello-world:local
KEYSTONE_DOCKER_IMAGE=${KEYSTONE_DOCKER_COMPOSE_PROJECT}:local

# ------------------------------------------------------------------------------
# Build configurations (optional) — conditional inclusion
# ------------------------------------------------------------------------------
#
# Gate parts of your manuscript so they appear only in certain builds. Tag
# content in Markdown with ifdef/ifndef and a symbol, e.g.:
#
#   ::: {.ifdef symbol="personal"}
#   A dedication only the private edition should carry.
#   :::
#
# A "configuration" is a named set of symbols. Declare one per line below as
# KEYSTONE_DEFINE_<name>="symbol1 symbol2 ...", then select it at publish time:
#
#   make publish using=<name>
#
# The configuration name becomes a suffix on the output filename (e.g.
# keystone-book-private-20250101.pdf), so editions never overwrite each other.
# An undefined symbol is simply false; selecting a name you didn't declare is an
# error. The names latex, epub, docx, and odt are reserved (each build defines
# its own format symbol automatically, so you can target a format directly with
# e.g. symbol="epub").
#
# Example:
# KEYSTONE_DEFINE_private="personal annotations drafts"

# Default configuration when `using=` is omitted (empty = plain/public build).
KEYSTONE_USING=
